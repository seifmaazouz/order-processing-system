name: Release Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release Backend & Frontend
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------
      # CHECKOUT
      # ---------------------------------------
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------
      # SETUP .NET 10
      # ---------------------------------------
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore Backend
        run: dotnet restore src/Backend/OrderProcessing.sln

      - name: Build Backend
        run: dotnet build src/Backend/OrderProcessing.sln --no-restore

      - name: Test Backend
        run: dotnet test src/Backend/OrderProcessing.sln --no-build --verbosity normal

      # ---------------------------------------
      # SETUP NODE for Frontend + semantic-release
      # ---------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root dependencies (semantic-release)
        run: npm install

      - name: Install Frontend Dependencies
        run: |
          cd src/Frontend/book-store-app
          npm install

      - name: Build Frontend
        run: |
          cd src/Frontend/book-store-app
          npm run build

      # ---------------------------------------
      # RUN semantic-release
      # ---------------------------------------
      - name: Run semantic-release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      # ---------------------------------------
      # LOGIN TO DOCKER HUB
      # ---------------------------------------
      - name: Login to DockerHub
        if: steps.semantic_release.outputs.new_release_published == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---------------------------------------
      # BACKEND DOCKER BUILD + PUSH
      # ---------------------------------------
      - name: Build Backend Image
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker build \
            -f src/Backend/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-backend:${VERSION#v} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-backend:latest \
            src/Backend

      - name: Push Backend Images
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-backend:${VERSION#v}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-backend:latest

      # ---------------------------------------
      # FRONTEND DOCKER BUILD + PUSH
      # ---------------------------------------
      - name: Build Frontend Image
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker build \
            -f src/Frontend/book-store-app/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-frontend:${VERSION#v} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-frontend:latest \
            src/Frontend/book-store-app

      - name: Push Frontend Images
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-frontend:${VERSION#v}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-frontend:latest

      # ---------------------------------------
      # DATABASE DOCKER BUILD + PUSH
      # ---------------------------------------
      - name: Build Database Image
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker build \
            -f src/Database/Dockerfile \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-db:${VERSION#v} \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-db:latest \
            src/Database

      - name: Push Database Images
        if: steps.semantic_release.outputs.new_release_published == 'true'
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-db:${VERSION#v}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-processing-db:latest
