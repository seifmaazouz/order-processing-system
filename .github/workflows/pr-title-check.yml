name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

jobs:
  check-pr-title:
    runs-on: ubuntu-latest

    steps:
      - name: Check PR title
        uses: thehanimo/pr-title-checker@v1.3.7
        with:
          pattern: '^(feat|fix|chore|docs|refactor|perf|test)(\([a-zA-Z0-9_-]+\))?: .+'
          error-message: 'PR title must follow conventional commit format: type(scope): description'
