version: "3.8"

services:
  db:
    build:
      context: ./src/Database/
    image: ordprosys/database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordprosys
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - net

volumes:
  db_data:

networks:
  net:
    driver: bridge
