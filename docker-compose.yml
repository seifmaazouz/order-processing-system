name: order-processing-system

services:
  frontend:
    container_name: react-frontend
    build:
      context: ./src/Frontend/book-store-app/
      dockerfile: Dockerfile
    image: ordprosys/frontend
    depends_on:
      - backend
    ports:
      - "5174:5174" 
    networks:
      - net
    environment:
      - VITE_API_BASE_URL=http://localhost:8080/api

  backend:
    container_name: dotnet-backend
    build:
      context: ./src/Backend/
    image: ordprosys/backend
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Development # or Production (set accordingly)
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__PostgresConnection: "Host=postgres-db;Port=5432;Database=ordprosys;Username=postgres;Password=postgres"
    ports:
      - "8080:8080"
    networks:
      - net
    
      
  db:
    container_name: postgres-db
    build:
      context: ./src/Database/
    image: ordprosys/database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ordprosys
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - net

volumes:
  db_data:

networks:
  net:
    driver: bridge
